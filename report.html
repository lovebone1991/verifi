<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifi – Audit Report</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4ef;
      --surface: #ffffff;
      --border: #dddcd4;
      --text: #0e0e0c;
      --muted: #6a6960;
      --faint: #9a9990;
      --accent: #1a56db;
      --green: #1a6b3c;
      --green-bg: #edf5f0;
      --red: #b83224;
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
    }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    header {
      width: 100%;
      padding: 20px 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: #b83224; }
    .header-right {
      margin-left: auto;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      font-family: var(--sans);
      transition: border-color 0.15s;
    }
    .btn:hover { border-color: #aaa; }
    .btn-primary {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }
    .btn-primary:hover { opacity: 0.85; }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-state a { color: var(--accent); text-decoration: none; }

    /* Feedback widget styles */
    .feedback-widget {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eeedea;
    }
    .feedback-label {
      font-size: 11px;
      color: var(--faint);
      flex: 1;
    }
    .feedback-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-family: var(--sans);
      transition: all 0.15s;
    }
    .feedback-btn:hover { border-color: #aaa; color: var(--text); }
    .feedback-btn.voted-yes { background: var(--green-bg); border-color: #a8d5b8; color: var(--green); }
    .feedback-btn.voted-no { background: #fdf0ee; border-color: #f5c4bc; color: var(--red); }
    .feedback-btn:disabled { cursor: default; opacity: 0.7; }
    .feedback-thanks {
      font-size: 11px;
      color: var(--green);
      display: none;
    }
    .feedback-thanks.visible { display: block; }

    /* Reason selector (appears after thumbs down) */
    .feedback-reason {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #eeedea;
      width: 100%;
    }
    .feedback-reason.visible { display: flex; }
    .feedback-reason-label { font-size: 11px; color: var(--faint); margin-bottom: 2px; }
    .reason-options { display: flex; flex-wrap: wrap; gap: 6px; }
    .reason-btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.15s;
    }
    .reason-btn:hover { border-color: #aaa; color: var(--text); }
    .reason-btn.selected { background: #fdf0ee; border-color: #f5c4bc; color: var(--red); }

    /* Free text input for "Other" reason */
    .reason-text-wrap {
      display: none;
      margin-top: 6px;
    }
    .reason-text-wrap.visible { display: flex; gap: 6px; align-items: flex-start; }
    .reason-text {
      flex: 1;
      font-size: 12px;
      font-family: var(--sans);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      background: var(--bg);
      color: var(--text);
      resize: none;
      min-height: 52px;
      outline: none;
      transition: border-color 0.15s;
    }
    .reason-text:focus { border-color: #aaa; }
    .reason-text-submit {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--text);
      color: #fff;
      cursor: pointer;
      font-family: var(--sans);
      white-space: nowrap;
      align-self: flex-end;
    }

    /* Fix confirmation bar at bottom of report */
    .fix-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .fix-bar-label { font-size: 13px; color: var(--muted); flex: 1; min-width: 200px; }
    .fix-options { display: flex; gap: 8px; }
    .fix-btn {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .fix-btn:hover { border-color: #aaa; color: var(--text); }
    .fix-btn.selected-yes { background: var(--green-bg); border-color: #a8d5b8; color: var(--green); }
    .fix-btn.selected-no { background: #f5f4ef; border-color: #ccc; color: var(--muted); }
    .fix-thanks { font-size: 11px; color: var(--green); display: none; }
    .fix-thanks.visible { display: block; }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .container { padding: 32px 16px 60px; }
    }
    @media print {
      header { display: none; }
      .feedback-widget { display: none; }
      body { background: #fff; }
    }
  </style>
</head>
<body>
<header>
  <a class="logo" href="/">Verifi<span>.</span></a>
  <div class="header-right">
    <a href="/" class="btn">← New Audit</a>
    <button class="btn btn-primary" id="exportBtn" onclick="exportPDF()">Export PDF</button>
  </div>
</header>
<div class="container">
  <div class="empty-state" id="emptyState">
    <p style="font-size:40px;margin-bottom:16px">📊</p>
    <p style="font-size:18px;font-weight:500;margin-bottom:8px">No report found</p>
    <p style="font-size:14px">Please <a href="/">upload a financial model</a> to generate an audit report.</p>
  </div>
  <div id="reportContent"></div>
</div>
<script>
  const WORKER_URL = 'https://verifi-analyze.rex-sen-ren.workers.dev';

  // ── Inject feedback widgets after report renders ──────────────────────────
  // ── Session ID (anonymous, persists across visits) ──────────────────────
  function getSessionId() {
    let id = localStorage.getItem('verifi_session_id');
    if (!id) {
      id = crypto.randomUUID();
      localStorage.setItem('verifi_session_id', id);
    }
    return id;
  }
  const SESSION_ID = getSessionId();

  // ── Send feedback to Worker ───────────────────────────────────────────────
  function sendFeedback(payload) {
    fetch(WORKER_URL + '/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...payload, sessionId: SESSION_ID }),
    }).catch(() => {});
  }

  // ── Inject feedback widgets into each finding card ────────────────────────
  function injectFeedbackWidgets(findings, context) {
    if (!findings || findings.length === 0) return;

    const allDivs = document.querySelectorAll('#reportContent div');

    findings.forEach(finding => {
      const ruleId = finding.id;

      for (const div of allDivs) {
        if (div.textContent.includes(ruleId + ' ·') && div.style.borderRadius === '12px') {
          if (div.querySelector('.feedback-widget')) continue;

          const widget = document.createElement('div');
          widget.className = 'feedback-widget';
          widget.dataset.ruleId = ruleId;
          widget.innerHTML = `
            <span class="feedback-label">Was this finding accurate?</span>
            <button class="feedback-btn" data-helpful="true">👍 Yes</button>
            <button class="feedback-btn" data-helpful="false">👎 No</button>
            <span class="feedback-thanks">Thanks — this helps Verifi improve</span>
            <div class="feedback-reason">
              <span class="feedback-reason-label">What was wrong with it?</span>
              <div class="reason-options">
                <button class="reason-btn" data-reason="false_positive">This error doesn't exist in my model</button>
                <button class="reason-btn" data-reason="wrong_severity">Severity is wrong</button>
                <button class="reason-btn" data-reason="unclear">Description is unclear</button>
                <button class="reason-btn" data-reason="other">Other</button>
              </div>
              <div class="reason-text-wrap">
                <textarea class="reason-text" placeholder="Tell us what was wrong…" rows="2"></textarea>
                <button class="reason-text-submit">Submit</button>
              </div>
            </div>
          `;

          const innerDiv = div.querySelector('div[style*="padding:14px"]') || div;
          innerDiv.appendChild(widget);

          const basePayload = {
            ruleId,
            modelType: context.modelType,
            sector: context.sector,
            verdict: context.verdict,
            finding: {
              id: finding.id,
              status: finding.status,
              impact: finding.impact,
              description: finding.description,
              irrImpact: finding.irrImpact,
              fix: finding.fix,
            },
            modelProfile: context.modelProfile,
            reportSummary: context.reportSummary,
            keyMetrics: context.keyMetrics,
          };

          // Track current vote state — allows changing vote
          let currentVote = null;

          widget.querySelectorAll('.feedback-btn').forEach(btn => {
            btn.addEventListener('click', () => {
              const helpful = btn.dataset.helpful === 'true';

              // Allow changing vote — reset all buttons
              widget.querySelectorAll('.feedback-btn').forEach(b => {
                b.classList.remove('voted-yes', 'voted-no');
              });
              btn.classList.add(helpful ? 'voted-yes' : 'voted-no');
              widget.querySelector('.feedback-thanks').classList.add('visible');

              currentVote = helpful;

              // Send feedback (overwrites previous if changed)
              sendFeedback({ ...basePayload, helpful, reason: null });

              // Show/hide reason selector based on vote
              const reasonEl = widget.querySelector('.feedback-reason');
              if (!helpful) {
                reasonEl.classList.add('visible');
              } else {
                reasonEl.classList.remove('visible');
                // Reset reason state if switching to yes
                widget.querySelectorAll('.reason-btn').forEach(b => b.classList.remove('selected'));
                widget.querySelector('.reason-text-wrap').classList.remove('visible');
              }
            });
          });

          // Reason buttons — send updated feedback with reason
          widget.querySelectorAll('.reason-btn').forEach(btn => {
            btn.addEventListener('click', () => {
              widget.querySelectorAll('.reason-btn').forEach(b => b.classList.remove('selected'));
              btn.classList.add('selected');
              const reason = btn.dataset.reason;

              // Show text input only for "Other"
              const textWrap = widget.querySelector('.reason-text-wrap');
              if (reason === 'other') {
                textWrap.classList.add('visible');
              } else {
                textWrap.classList.remove('visible');
                sendFeedback({ ...basePayload, helpful: false, reason });
              }
            });
          });

          // Submit free text feedback
          const textSubmit = widget.querySelector('.reason-text-submit');
          if (textSubmit) {
            textSubmit.addEventListener('click', () => {
              const text = widget.querySelector('.reason-text').value.trim();
              if (text) {
                sendFeedback({ ...basePayload, helpful: false, reason: 'other', freeText: text });
                textSubmit.textContent = 'Sent ✓';
                textSubmit.disabled = true;
              }
            });
          }

          break;
        }
      }
    });
  }

  // ── PDF Export ────────────────────────────────────────────────────────────
  function exportPDF() {
    const btn = document.getElementById('exportBtn');
    btn.textContent = 'Generating…';
    btn.disabled = true;

    const raw = sessionStorage.getItem('verifi_report');
    let fileName = 'Verifi_Report';
    if (raw) {
      try {
        const data = JSON.parse(raw);
        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        const datePart = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
        const timePart = `${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
        const namePart = (data.originalFileName || 'Model').replace(/[^a-zA-Z0-9_\-]/g, '_');
        fileName = `Verifi_${datePart}_${timePart}_${namePart}`;
      } catch {}
    }

    const element = document.getElementById('reportContent');
    const opt = {
      margin: [12, 12, 12, 12],
      filename: fileName + '.pdf',
      image: { type: 'jpeg', quality: 0.95 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    };

    html2pdf().set(opt).from(element).save().then(() => {
      btn.textContent = 'Export PDF';
      btn.disabled = false;
    });
  }

  // ── Fix confirmation bar ─────────────────────────────────────────────────
  function injectFixBar(context) {
    const container = document.getElementById('reportContent');
    if (!container) return;

    const bar = document.createElement('div');
    bar.className = 'fix-bar';
    bar.style.marginBottom = '20px';
    bar.innerHTML = `
      <span class="fix-bar-label">After reviewing this report, did you go fix any of the issues?</span>
      <div class="fix-options">
        <button class="fix-btn" data-fixed="true">✓ Yes, fixed some</button>
        <button class="fix-btn" data-fixed="false">Not yet</button>
      </div>
      <span class="fix-thanks visible" style="display:none">Thanks — good to know</span>
    `;
    // Insert before the last 2 elements (scope text + send feedback card)
    const children = container.children;
    const insertBefore = children.length >= 2 ? children[children.length - 2] : null;
    if (insertBefore) {
      container.insertBefore(bar, insertBefore);
    } else {
      container.appendChild(bar);
    }

    bar.querySelectorAll('.fix-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const fixed = btn.dataset.fixed === 'true';
        bar.querySelectorAll('.fix-btn').forEach(b => {
          b.classList.remove('selected-yes', 'selected-no');
          b.disabled = true;
        });
        btn.classList.add(fixed ? 'selected-yes' : 'selected-no');
        bar.querySelector('.fix-thanks').style.display = 'block';

        sendFeedback({
          type: 'fix_confirmation',
          fixed,
          modelType: context.modelType,
          sector: context.sector,
          verdict: context.verdict,
          reportSummary: context.reportSummary,
          keyMetrics: context.keyMetrics,
        });
      });
    });
  }

  // ── Load report from sessionStorage ──────────────────────────────────────
  const raw = sessionStorage.getItem('verifi_report');
  if (raw) {
    try {
      const data = JSON.parse(raw);
      const container = document.getElementById('reportContent');
      document.getElementById('emptyState').style.display = 'none';

      // ── Render JSON findings (new agentic loop output) ──────────────────
      if (data.findings && !data.reportHtml) {
        const statusColor = { FAIL: '#b83224', WARN: '#7a5200', PASS: '#1a6b3c' };
        const statusBg = { FAIL: '#fdf0ee', WARN: '#fdf6e3', PASS: '#edf5f0' };
        const verdict = data.verdict || 'WARN';

        // Header
        let html = `
          <div style="background:${statusBg[verdict]};border:1px solid ${statusColor[verdict]}33;border-radius:12px;padding:20px 24px;margin-bottom:24px">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
              <span style="font-size:22px;font-weight:700;color:${statusColor[verdict]}">${verdict}</span>
              <span style="font-size:14px;color:#5a5a56">${data.modelName || 'Financial Model'} · ${data.modelType || ''} · ${data.sector || ''}</span>
            </div>
            <div style="font-size:13px;color:#5a5a56">
              ${data.geography ? `📍 ${data.geography}` : ''}
              ${data.analysisTime ? ` &nbsp;·&nbsp; ⏱ ${data.analysisTime}` : ''}
              ${data.cached ? ' &nbsp;·&nbsp; ♻️ Cached result' : ''}
            </div>
            <div style="display:flex;gap:16px;margin-top:12px">
              ${['fail','warn','pass'].map(s => `<span style="font-size:13px"><strong style="color:${statusColor[s.toUpperCase()]}">${data.summary?.[s] || 0}</strong> ${s.toUpperCase()}</span>`).join('')}
            </div>
          </div>`;

        // Metrics panel
        if (data.keyMetrics && Object.values(data.keyMetrics).some(v => v !== null)) {
          const metrics = data.keyMetrics;
          const metricItems = [
            ['Unlev IRR', metrics.unleveredIRR],
            ['Levered IRR', metrics.leveredIRR],
            ['Cap Rate', metrics.capRate],
            ['WACD', metrics.wacd],
            ['ICR', metrics.icr],
            ['LVR', metrics.ltv],
            ['LTC', metrics.ltc],
            ['WALE', metrics.wale],
            ['YoC', metrics.yieldOnCost],
            ['Dev Margin', metrics.devMargin],
            ['Occupancy', metrics.occupancy],
            ['Dist. Yield', metrics.distributionYield],
            ['NAV/Unit', metrics.navPerUnit],
            ['Hold Period', metrics.holdPeriod],
            ['Rev/sqm', metrics.revenuePerSqm],
          ].filter(([, v]) => v !== null && v !== undefined);

          if (metricItems.length > 0) {
            html += `<div style="background:white;border:1px solid #dddcd4;border-radius:12px;padding:16px 20px;margin-bottom:20px">
              <div style="font-size:11px;font-weight:600;color:#9a9990;letter-spacing:.08em;margin-bottom:12px">KEY METRICS</div>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px">
                ${metricItems.map(([label, val]) => `
                  <div style="background:#f5f4ef;border-radius:8px;padding:8px 12px">
                    <div style="font-size:10px;color:#9a9990;margin-bottom:2px">${label}</div>
                    <div style="font-size:14px;font-weight:600;color:#1a1a18">${val}</div>
                  </div>`).join('')}
              </div>
            </div>`;
          }
        }

        // Findings
        html += `<div style="margin-bottom:20px">
          <div style="font-size:11px;font-weight:600;color:#9a9990;letter-spacing:.08em;margin-bottom:12px">FINDINGS</div>`;

        for (const f of (data.findings || [])) {
          const s = f.status || 'WARN';
          const cellsHtml = (f.cells || []).slice(0, 6).map(c => `
            <div style="display:flex;gap:8px;padding:4px 8px;background:#f5f4ef;border-radius:5px;font-size:11px;margin-bottom:3px">
              <span style="font-family:monospace;color:#7a5200;min-width:70px">${c.ref}</span>
              <span style="color:#5a5a56">${c.note}</span>
              ${c.value ? `<span style="font-family:monospace;color:#9a9990;margin-left:auto">${c.value}</span>` : ''}
            </div>`).join('');

          html += `
            <div style="background:white;border:1px solid #dddcd4;border-radius:10px;overflow:hidden;margin-bottom:8px">
              <div style="background:${statusBg[s]};padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #dddcd4">
                <span style="font-size:10px;font-weight:600;color:${statusColor[s]}">${s}</span>
                <span style="font-size:12px;font-weight:500;flex:1">${f.id} · ${f.title}</span>
                ${f.impact && f.impact !== 'NONE' ? `<span style="font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid #dddcd4;color:#5a5a56;background:white">${f.impact}</span>` : ''}
              </div>
              <div style="padding:12px 14px">
                <p style="font-size:12px;color:#5a5a56;line-height:1.7;margin-bottom:8px">${f.description}</p>
                ${cellsHtml ? `<div style="margin-bottom:8px">${cellsHtml}</div>` : ''}
                ${f.irrImpact ? `<div style="font-size:11px;color:${statusColor[s]};background:${statusBg[s]};padding:6px 10px;border-radius:6px;margin-bottom:8px"><strong>IRR impact:</strong> ${f.irrImpact}</div>` : ''}
                ${f.fix ? `<div style="font-size:11px;color:#1a6b3c;background:#edf5f0;padding:6px 10px;border-radius:6px"><strong>Fix:</strong> ${f.fix}</div>` : ''}
              </div>
            </div>`;
        }
        html += `</div>`;

        // Analysis Metrics Panel (for testing/optimization)
        if (data.metrics) {
          const m = data.metrics;
          const toolRows = Object.entries(m.toolCallCount || {})
            .sort((a, b) => b[1] - a[1])
            .map(([tool, count]) => `<span style="font-size:11px;background:#f5f4ef;padding:2px 8px;border-radius:4px;margin:2px">${tool} ×${count}</span>`)
            .join('');

          html += `
            <div style="background:white;border:1px solid #dddcd4;border-radius:12px;padding:16px 20px;margin-bottom:20px">
              <div style="font-size:11px;font-weight:600;color:#9a9990;letter-spacing:.08em;margin-bottom:12px">⚙️ ANALYSIS METRICS</div>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:12px">
                ${[
                  ['Analysis time', data.analysisTime || '—'],
                  ['Agentic rounds', m.rounds || '—'],
                  ['Input tokens', (m.inputTokens || 0).toLocaleString()],
                  ['Output tokens', (m.outputTokens || 0).toLocaleString()],
                  ['Cached tokens', (m.cachedTokens || 0).toLocaleString()],
                  ['Cache hit rate', m.cacheHitRate || '0%'],
                  ['Est. cost', '$' + (m.estimatedCostUSD || '0')],
                  ['Total tool calls', (m.toolsUsed || []).length],
                ].map(([label, val]) => `
                  <div style="background:#f5f4ef;border-radius:8px;padding:8px 10px">
                    <div style="font-size:10px;color:#9a9990;margin-bottom:2px">${label}</div>
                    <div style="font-size:13px;font-weight:600;color:#1a1a18">${val}</div>
                  </div>`).join('')}
              </div>
              <div style="font-size:10px;color:#9a9990;margin-bottom:6px;font-weight:600">TOOL USAGE</div>
              <div style="display:flex;flex-wrap:wrap;gap:4px">${toolRows || '<span style="font-size:11px;color:#9a9990">No tools recorded</span>'}</div>
            </div>`;
        }

        // Scope note
        html += `<p style="font-size:11px;color:#9a9990;text-align:center;padding:0 20px">${data.scope || 'This report checks structural and mathematical integrity. A clean Verifi report is necessary but not sufficient for a reliable model.'}</p>`;

        container.innerHTML = html;

        // Build feedback context
        const feedbackContext = {
          modelType: data.modelType || null,
          sector: data.sector || null,
          verdict: data.verdict || null,
          reportSummary: data.summary || null,
          keyMetrics: data.keyMetrics || null,
          allFindings: data.findings || [],
        };

        const nonPassFindings = (data.findings || []).filter(f => f.status !== 'PASS');
        if (nonPassFindings.length > 0) {
          setTimeout(() => injectFeedbackWidgets(nonPassFindings, feedbackContext), 50);
        }
        setTimeout(() => injectFixBar(feedbackContext), 100);

      // ── Legacy HTML report format ────────────────────────────────────────
      } else if (data.reportHtml) {
        container.innerHTML = data.reportHtml;

        const feedbackContext = {
          modelType: data.modelType || null,
          sector: data.sector || null,
          verdict: data.verdict || null,
          reportSummary: data.summary || null,
          keyMetrics: data.keyMetrics || null,
          modelProfile: data.modelProfile || null,
          allFindings: data.findings || [],
        };

        const nonPassFindings = (data.findings || []).filter(f => f.status !== 'PASS');
        if (nonPassFindings.length > 0) {
          setTimeout(() => injectFeedbackWidgets(nonPassFindings, feedbackContext), 50);
        }
        setTimeout(() => injectFixBar(feedbackContext), 100);
      }

    } catch {
      // leave empty state visible
    }
  }
</script>
</body>
</html>
