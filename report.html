<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifi — Audit Report</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4ef;
      --surface: #ffffff;
      --border: #dddcd4;
      --text: #0e0e0c;
      --muted: #6a6960;
      --faint: #9a9990;
      --accent: #1a56db;
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      width: 100%;
      padding: 20px 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: #b83224; }

    .header-right {
      margin-left: auto;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      font-family: var(--sans);
      transition: border-color 0.15s;
    }
    .btn:hover { border-color: #aaa; }
    .btn-primary {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }
    .btn-primary:hover { opacity: 0.85; }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-state a { color: var(--accent); text-decoration: none; }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .container { padding: 32px 16px 60px; }
    }

    @media print {
      header { display: none; }
      body { background: #fff; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">Verifi<span>.</span></a>
  <div class="header-right">
    <a href="/" class="btn">← New Audit</a>
    <button class="btn btn-primary" onclick="window.print()">Export PDF</button>
  </div>
</header>

<div class="container">
  <div class="empty-state" id="emptyState">
    <p style="font-size:40px;margin-bottom:16px">📊</p>
    <p style="font-size:18px;font-weight:500;margin-bottom:8px">No report found</p>
    <p style="font-size:14px">Please <a href="/">upload a financial model</a> to generate an audit report.</p>
  </div>
  <div id="reportContent"></div>
</div>

<script>
  const raw = sessionStorage.getItem('verifi_report');
  if (raw) {
    try {
      const data = JSON.parse(raw);
      if (data.reportHtml) {
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('reportContent').innerHTML = data.reportHtml;
      }
    } catch {
      // leave empty state visible
    }
  }
</script>
</body>
</html>
